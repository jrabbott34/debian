[window]
padding = { x = 8, y = 6 }
decorations = "full"
opacity = 0.95
dynamic_title = true

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold   = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
size   = 11.5

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500

[scrolling]
history    = 10000
multiplier = 3

# Nord color scheme
[colors.primary]
background = "#2E3440"
foreground = "#D8DEE9"
dim_foreground = "#A5AAAD"

[colors.cursor]
text   = "#2E3440"
cursor = "#D8DEE9"

[colors.normal]
black   = "#3B4252"
red     = "#BF616A"
green   = "#A3BE8C"
yellow  = "#EBCB8B"
blue    = "#81A1C1"
magenta = "#B48EAD"
cyan    = "#88C0D0"
white   = "#E5E9F0"

[colors.bright]
black   = "#4C566A"
red     = "#BF616A"
green   = "#A3BE8C"
yellow  = "#EBCB8B"
blue    = "#81A1C1"
magenta = "#B48EAD"
cyan    = "#8FBCBB"
white   = "#ECEFF4"

[keyboard]
bindings = [
    { key = "V", mods = "Control|Shift", action = "Paste" },
    { key = "C", mods = "Control|Shift", action = "Copy" },
    { key = "Plus",  mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0",  mods = "Control", action = "ResetFontSize" },
]
