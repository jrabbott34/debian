# picom compositor config

backend           = "glx";
vsync             = true;
glx-no-stencil    = true;

# Shadows
shadow            = true;
shadow-radius     = 12;
shadow-offset-x   = -7;
shadow-offset-y   = -7;
shadow-opacity    = 0.5;
shadow-exclude    = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'i3-frame'",
    "class_g = 'polybar'"
];

# Fading
fading            = true;
fade-in-step      = 0.05;
fade-out-step     = 0.05;
fade-delta        = 4;

# Opacity
inactive-opacity          = 0.92;
active-opacity            = 1.0;
frame-opacity             = 0.9;
inactive-opacity-override = false;
opacity-rule              = [
    "100:class_g = 'firefox'",
    "100:class_g = 'thunderbird'",
    "100:class_g = 'mpv'",
    "100:class_g = 'Alacritty' && focused",
    "95:class_g = 'Alacritty' && !focused"
];

# Blur (glx backend only)
blur-background       = false;
blur-method           = "dual_kawase";
blur-strength         = 4;

# Misc
mark-wmwin-focused    = true;
mark-ovredir-focused  = true;
use-ewmh-active-win   = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
detect-client-leader   = true;
use-damage             = true;
log-level              = "warn";
