;  Polybar config — Nord palette, i3 workspaces, Louisville KY weather

[colors]
bg         = #CC2E3440
bg-alt     = #3B4252
fg         = #ECEFF4
fg-alt     = #D8DEE9
dim        = #4C566A
blue       = #5E81AC
cyan       = #88C0D0
green      = #A3BE8C
yellow     = #EBCB8B
orange     = #D08770
red        = #BF616A
magenta    = #B48EAD
nord0      = #2E3440
nord1      = #3B4252
nord3      = #4C566A
nord4      = #D8DEE9

; ── Bar ───────────────────────────────────────────────────────────────────────

[bar/mainbar]
monitor            = ${env:MONITOR:}
width              = 100%
height             = 28
offset-x           = 0
offset-y           = 0
radius             = 0
fixed-center       = true

background         = ${colors.bg}
foreground         = ${colors.fg}

line-size          = 2
line-color         = ${colors.blue}

border-size        = 0
padding-left       = 1
padding-right      = 2
module-margin-left = 1
module-margin-right= 1

font-0             = FiraCode Nerd Font:style=Regular:size=10;2
font-1             = Font Awesome 6 Free:style=Solid:size=10;2
font-2             = Font Awesome 6 Brands:style=Regular:size=10;2
font-3             = Noto Color Emoji:size=10;2

modules-left   = i3
modules-center = clock
modules-right  = weather sep idle-inhibitor sep cpu memory sep pulseaudio sep

tray-position      = right
tray-padding       = 4
tray-background    = ${colors.bg}

cursor-click  = pointer
cursor-scroll = ns-resize

wm-restack = i3
override-redirect = false

; ── i3 workspaces ─────────────────────────────────────────────────────────────

[module/i3]
type                        = internal/i3
format                      = <label-state> <label-mode>
index-sort                  = true
wrapping-scroll             = false
strip-wsnumbers             = true
pin-workspaces              = true

label-mode                  = %mode%
label-mode-padding          = 2
label-mode-foreground       = ${colors.fg}
label-mode-background       = ${colors.orange}

label-focused               = %index%
label-focused-background    = ${colors.blue}
label-focused-foreground    = ${colors.fg}
label-focused-underline     = ${colors.cyan}
label-focused-padding       = 3

label-unfocused             = %index%
label-unfocused-padding     = 3
label-unfocused-foreground  = ${colors.dim}

label-visible               = %index%
label-visible-background    = ${colors.bg-alt}
label-visible-padding       = 3

label-urgent                = %index%
label-urgent-background     = ${colors.red}
label-urgent-foreground     = ${colors.fg}
label-urgent-padding        = 3

; ── Clock / Calendar toggle ───────────────────────────────────────────────────

[module/clock]
type             = internal/date
interval         = 5

; Left-click shows date; right-click opens yad calendar popup
date             = %a %b %d
time             = %I:%M %p

format-prefix            = "  "
format-prefix-foreground = ${colors.cyan}
format                   = <label>
label                    = %date%  %time%
label-font               = 1

click-left  = $HOME/.config/polybar/scripts/calendar-popup.sh &
click-right = $HOME/.config/polybar/scripts/calendar-popup.sh &

; ── Weather (Louisville, KY) ──────────────────────────────────────────────────

[module/weather]
type             = custom/script
exec             = $HOME/.config/polybar/scripts/weather.sh
interval         = 600
format           = <label>
label            = %output%
label-foreground = ${colors.yellow}
click-left       = xdg-open "https://wttr.in/Louisville+KY" &

; ── CPU ───────────────────────────────────────────────────────────────────────

[module/cpu]
type                        = internal/cpu
interval                    = 2
format-prefix               = "  "
format-prefix-foreground    = ${colors.orange}
format                      = <label>
label                       = %percentage:3%%
label-foreground            = ${colors.fg-alt}

; ── Memory ────────────────────────────────────────────────────────────────────

[module/memory]
type                        = internal/memory
interval                    = 2
format-prefix               = " 󰾆 "
format-prefix-foreground    = ${colors.magenta}
format                      = <label>
label                       = %percentage_used:3%%
label-foreground            = ${colors.fg-alt}

; ── PulseAudio / PipeWire ─────────────────────────────────────────────────────

[module/pulseaudio]
type                        = internal/pulseaudio
use-ui-max                  = true
interval                    = 5

format-volume               = <ramp-volume> <label-volume>
format-volume-foreground    = ${colors.fg-alt}
label-volume                = %percentage%%

format-muted-prefix         = " 󰝟 "
format-muted-prefix-foreground = ${colors.red}
label-muted                 = muted
label-muted-foreground      = ${colors.dim}

ramp-volume-0               = " 󰕿 "
ramp-volume-1               = " 󰖀 "
ramp-volume-2               = " 󰕾 "
ramp-volume-foreground      = ${colors.green}

click-right                 = pavucontrol &

; ── Idle inhibitor ────────────────────────────────────────────────────────────

[module/idle-inhibitor]
type            = custom/script
exec            = $HOME/.config/polybar/scripts/idle-inhibitor.sh status
click-left      = $HOME/.config/polybar/scripts/idle-inhibitor.sh toggle && pkill -RTMIN+12 polybar
interval        = 0
; Force refresh via signal RTMIN+12
format          = <label>
label           = %output%
label-foreground = ${colors.cyan}

; ── Separator ─────────────────────────────────────────────────────────────────

[module/sep]
type    = custom/text
content = " │ "
content-foreground = ${colors.nord3}
