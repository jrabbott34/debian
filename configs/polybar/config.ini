; Polybar config — Catppuccin Mocha + pill layout

; ── Catppuccin Mocha palette ──────────────────────────────────────────────────

[colors]
base      = #1e1e2e
mantle    = #181825
crust     = #11111b
surface0  = #313244
surface1  = #45475a
surface2  = #585b70
overlay0  = #6c7086
overlay1  = #7f849c
overlay2  = #9399b2
subtext0  = #a6adc8
subtext1  = #bac2de
text      = #cdd6f4
lavender  = #b4befe
blue      = #89b4fa
sapphire  = #74c7ec
sky       = #89dceb
teal      = #94e2d5
green     = #a6e3a1
yellow    = #f9e2af
peach     = #fab387
maroon    = #eba0ac
red       = #f38ba8
mauve     = #cba6f7
pink      = #f5c2e7
flamingo  = #f2cdcd
rosewater = #f5e0dc

; Transparent bar background (AA = 00 means fully transparent, adjust for blur)
bar-bg    = #CC1e1e2e

; ── Bar ───────────────────────────────────────────────────────────────────────

[bar/mainbar]
monitor            = ${env:MONITOR:}

; Floating pill bar: not full-width, centered, with radius
width              = 98%
height             = 32
offset-x           = 1%
offset-y           = 6
radius             = 16.0
fixed-center       = true

background         = ${colors.bar-bg}
foreground         = ${colors.text}

border-size        = 0
padding-left       = 2
padding-right      = 2

; Space between modules — the gap that makes pills visually distinct
module-margin-left  = 0
module-margin-right = 0

font-0 = FiraCode Nerd Font:style=Regular:size=10;3
font-1 = Font Awesome 6 Free:style=Solid:size=10;3
font-2 = Font Awesome 6 Brands:style=Regular:size=10;3
font-3 = Noto Color Emoji:size=10;3

modules-left   = i3 spacer
modules-center = clock
modules-right  = spacer weather pill-sep cpu memory pill-sep pulseaudio pill-sep idle-pill tray

cursor-click  = pointer
cursor-scroll = ns-resize

wm-restack        = i3
override-redirect = false

; ── i3 workspaces — each number is its own pill ───────────────────────────────

[module/i3]
type                        = internal/i3
format                      = <label-state> <label-mode>
index-sort                  = true
wrapping-scroll             = false
strip-wsnumbers             = true
pin-workspaces              = true

label-mode                  = %mode%
label-mode-padding          = 2
label-mode-foreground       = ${colors.base}
label-mode-background       = ${colors.peach}

label-focused               = %index%
label-focused-background    = ${colors.mauve}
label-focused-foreground    = ${colors.base}
label-focused-padding       = 3

label-unfocused             = %index%
label-unfocused-padding     = 3
label-unfocused-foreground  = ${colors.overlay1}
label-unfocused-background  = ${colors.surface0}

label-visible               = %index%
label-visible-background    = ${colors.surface1}
label-visible-foreground    = ${colors.subtext1}
label-visible-padding       = 3

label-urgent                = %index%
label-urgent-background     = ${colors.red}
label-urgent-foreground     = ${colors.base}
label-urgent-padding        = 3

; ── Clock pill (center) ───────────────────────────────────────────────────────

[module/clock]
type     = internal/date
interval = 5

date = %a %b %d
time = %I:%M %p

format-background = ${colors.surface0}
format-padding    = 3
format            = <label>
label             =   %date%   %time%
label-foreground  = ${colors.text}

click-left  = $HOME/.config/polybar/scripts/calendar-popup.sh &
click-right = $HOME/.config/polybar/scripts/calendar-popup.sh &

; ── Weather pill ─────────────────────────────────────────────────────────────

[module/weather]
type              = custom/script
exec              = $HOME/.config/polybar/scripts/weather.sh
interval          = 600
format-background = ${colors.surface0}
format-padding    = 3
format            = <label>
label             = %output%
label-foreground  = ${colors.yellow}
click-left        = $HOME/.config/polybar/scripts/weather-popup.sh &
click-right       = $HOME/.config/polybar/scripts/weather-popup.sh &

; ── System pill — CPU + RAM combined ──────────────────────────────────────────

[module/cpu]
type                     = internal/cpu
interval                 = 2
format-background        = ${colors.surface0}
format-padding           = 2
format-prefix            = "  "
format-prefix-foreground = ${colors.peach}
format                   = <label>
label                    = %percentage:3%%
label-foreground         = ${colors.text}

[module/memory]
type                     = internal/memory
interval                 = 2
format-background        = ${colors.surface0}
format-padding           = 2
format-prefix            = " 󰾆 "
format-prefix-foreground = ${colors.mauve}
format                   = <label>
label                    = %percentage_used:3%%
label-foreground         = ${colors.text}

; ── Volume pill ───────────────────────────────────────────────────────────────

[module/pulseaudio]
type              = internal/pulseaudio
use-ui-max        = true
interval          = 1

format-volume-background = ${colors.surface0}
format-volume-padding    = 3
format-volume            = <ramp-volume><label-volume>
label-volume             = %percentage%%
label-volume-foreground  = ${colors.text}

format-muted-background        = ${colors.surface0}
format-muted-padding           = 3
format-muted-prefix            = " 󰝟 "
format-muted-prefix-foreground = ${colors.red}
label-muted                    = muted
label-muted-foreground         = ${colors.overlay0}

ramp-volume-0          = " 󰕿 "
ramp-volume-1          = " 󰖀 "
ramp-volume-2          = " 󰕾 "
ramp-volume-foreground = ${colors.green}

click-right = /bin/bash -c "pavucontrol &"

; ── Idle inhibitor pill ───────────────────────────────────────────────────────

[module/idle-pill]
type              = custom/script
exec              = $HOME/.config/polybar/scripts/idle-inhibitor.sh status
click-left        = $HOME/.config/polybar/scripts/idle-inhibitor.sh toggle && pkill -RTMIN+12 polybar
interval          = 0
format-background = ${colors.surface0}
format-padding    = 3
format            = <label>
label             = %output%
label-foreground  = ${colors.sapphire}

; ── Pill separator (gap between pill groups) ──────────────────────────────────

[module/pill-sep]
type    = custom/text
content = "  "
content-foreground = #00000000

; ── Invisible spacer ─────────────────────────────────────────────────────────

[module/spacer]
type    = custom/text
content = " "
content-foreground = #00000000

; ── System tray ───────────────────────────────────────────────────────────────

[module/tray]
type            = internal/tray
icon-size       = 16
icon-spacing    = 4
padding         = 4
background      = ${colors.bar-bg}
