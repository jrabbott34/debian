format = """
[](fg:#313244)\
$os\
$username\
[](bg:#45475a fg:#313244)\
$directory\
[](bg:#cba6f7 fg:#45475a)\
$git_branch\
$git_status\
[](bg:#89b4fa fg:#cba6f7)\
$python\
$nodejs\
$rust\
[](fg:#89b4fa)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

[fill]
symbol = " "

[os]
disabled = false
style = "bg:#313244 fg:#cdd6f4"

[os.symbols]
Linux = " "
Debian = " "

[username]
show_always = true
style_user = "bg:#313244 fg:#cdd6f4"
style_root = "bg:#f38ba8 fg:#1e1e2e"
format = "[ $user ]($style)"

[directory]
style = "bg:#45475a fg:#cdd6f4"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = ""
"Pictures" = ""
"git" = ""

[git_branch]
symbol = ""
style = "bg:#cba6f7 fg:#1e1e2e"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:#cba6f7 fg:#1e1e2e"
format = "[$all_status$ahead_behind ]($style)"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "󰏗"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[python]
symbol = ""
style = "bg:#89b4fa fg:#1e1e2e"
format = "[ $symbol $version ]($style)"

[nodejs]
symbol = ""
style = "bg:#89b4fa fg:#1e1e2e"
format = "[ $symbol $version ]($style)"

[rust]
symbol = ""
style = "bg:#89b4fa fg:#1e1e2e"
format = "[ $symbol $version ]($style)"

[cmd_duration]
min_time = 2000
style = "fg:#f9e2af"
format = "[ 󱦟 $duration ]($style)"

[time]
disabled = false
style = "fg:#a6adc8"
format = "[ $time ]($style)"
time_format = "%I:%M %p"

[character]
success_symbol = "[❯](fg:#a6e3a1)"
error_symbol = "[❯](fg:#f38ba8)"
